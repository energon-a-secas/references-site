name: Process Reference Submission

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-pr:
    # Only run when a maintainer adds the 'approved' label
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Parse issue and open PR
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body  = issue.body || '';

            // GitHub Issue Forms render each field as:
            //   ### Field label\n\nvalue\n\n### Next field
            function parseField(body, heading) {
              const escaped = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const re = new RegExp(`### ${escaped}\\s*\\n\\n([\\s\\S]*?)(?=\\n\\n### |$)`);
              const m  = body.match(re);
              if (!m) return '';
              const val = m[1].trim();
              return val === '_No response_' ? '' : val;
            }

            const label       = parseField(body, 'Reference label');
            const source      = parseField(body, 'Source');
            const triggersRaw = parseField(body, 'Trigger phrases');
            const customRegex = parseField(body, 'Custom regex');
            const mediaUrl    = parseField(body, 'Media URL');
            const language    = parseField(body, 'Language');
            const tagsRaw     = parseField(body, 'Tags');

            // Validate required fields
            if (!label || !source || !triggersRaw || !mediaUrl) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                body: '❌ **Missing required fields.** Please ensure Label, Source, Trigger phrases, and Media URL are all filled in.',
              });
              core.setFailed('Missing required fields');
              return;
            }

            // Generate a kebab-case id from the label
            const id = label.toLowerCase()
              .replace(/[áàä]/g, 'a').replace(/[éèë]/g, 'e')
              .replace(/[íìï]/g, 'i').replace(/[óòö]/g, 'o')
              .replace(/[úùü]/g, 'u').replace(/[ñ]/g, 'n')
              .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');

            // Build trigger
            const keywords = triggersRaw.split('\n').map(l => l.trim()).filter(Boolean);
            const pattern  = customRegex || `(${keywords.join('|')})`;

            // Detect media type from URL
            const isYoutube = /youtube\.com|youtu\.be/.test(mediaUrl);
            const isGif     = /\.gif($|\?)|giphy\.com/.test(mediaUrl);
            const mediaType = isYoutube ? 'youtube' : isGif ? 'gif' : 'image';

            // Parse tags
            const tags = tagsRaw
              ? tagsRaw.split(',').map(t => t.trim().toLowerCase()).filter(Boolean)
              : [];

            const entry = {
              id,
              label,
              source,
              trigger: { pattern, flags: 'i', keywords },
              media: [{ url: mediaUrl, type: mediaType, primary: true }],
              language: language || 'es',
              tags,
            };

            // Read current references.json
            const { data: fileData } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              path:  'api/v1/references.json',
            });
            const existing = JSON.parse(Buffer.from(fileData.content, 'base64').toString('utf8'));

            // Warn on duplicate id (don't block — let maintainer decide)
            if (existing.references.some(r => r.id === id)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                issue_number: issue.number,
                body: `⚠️ A reference with id \`${id}\` already exists. The maintainer will resolve the conflict before merging.`,
              });
            }

            // Append entry and update meta
            existing.references.push(entry);
            existing.meta.count     = existing.references.length;
            existing.meta.generated = new Date().toISOString().split('T')[0];

            const newContent = JSON.stringify(existing, null, 2) + '\n';

            // Create a new branch off main
            const branchName = `submission/issue-${issue.number}-${id}`;
            const { data: mainRef } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   'heads/main',
            });
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   `refs/heads/${branchName}`,
              sha:   mainRef.object.sha,
            });

            // Commit the updated JSON
            await github.rest.repos.createOrUpdateFileContents({
              owner:   context.repo.owner,
              repo:    context.repo.repo,
              path:    'api/v1/references.json',
              message: `feat: add "${label}" reference (closes #${issue.number})`,
              content: Buffer.from(newContent).toString('base64'),
              branch:  branchName,
              sha:     fileData.sha,
            });

            // Open the PR
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `Add reference: ${label}`,
              body: [
                `Closes #${issue.number}`,
                `Submitted by @${issue.user.login}`,
                '',
                '## Entry preview',
                '```json',
                JSON.stringify(entry, null, 2),
                '```',
              ].join('\n'),
              head: branchName,
              base: 'main',
            });

            // Comment on the issue with the PR link
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: issue.number,
              body: `✅ PR opened: ${pr.data.html_url}\n\nThanks for submitting **${label}**, @${issue.user.login}! A maintainer will review and merge it shortly.`,
            });
